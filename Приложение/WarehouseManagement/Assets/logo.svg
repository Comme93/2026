<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#0f172a"/>

  <!-- Main box shape -->
  <g transform="translate(128, 128)">
    <!-- Box outline -->
    <rect x="-60" y="-50" width="120" height="100" fill="none" stroke="#3b82f6" stroke-width="3" rx="8"/>

    <!-- Box lid -->
    <path d="M -60 -50 L -40 -70 L 40 -70 L 60 -50" fill="#3b82f6" opacity="0.8"/>

    <!-- Box front -->
    <rect x="-60" y="-50" width="120" height="100" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4"/>

    <!-- Shine effect -->
    <ellipse cx="-20" cy="-30" rx="25" ry="15" fill="#60a5fa" opacity="0.3"/>

    <!-- Package symbol inside -->
    <circle cx="0" cy="0" r="8" fill="#34d399" opacity="0.9"/>
    <circle cx="-20" cy="-15" r="6" fill="#34d399" opacity="0.7"/>
    <circle cx="20" cy="-15" r="6" fill="#34d399" opacity="0.7"/>
    <circle cx="-20" cy="15" r="6" fill="#34d399" opacity="0.7"/>
    <circle cx="20" cy="15" r="6" fill="#34d399" opacity="0.7"/>

    <!-- Text -->
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6" text-anchor="middle">WAREHOUSE</text>
  </g>
</svg>
